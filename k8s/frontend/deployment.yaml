apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: medsync
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_AUTH_SERVICE_URL
          value: "http://medsync.local/api/auth"
        - name: NEXT_PUBLIC_PATIENT_SERVICE_URL
          value: "http://medsync.local/api/patients"
        - name: NEXT_PUBLIC_DOCTOR_SERVICE_URL
          value: "http://medsync.local/api/doctors"
        - name: NEXT_PUBLIC_APPOINTMENT_SERVICE_URL
          value: "http://medsync.local/api/appointments"
        - name: NEXT_PUBLIC_TELEMEDICINE_SERVICE_URL
          value: "http://medsync.local/api/sessions"
        - name: NEXT_PUBLIC_PAYMENT_SERVICE_URL
          value: "http://medsync.local/api/payments"
        - name: NEXT_PUBLIC_NOTIFICATION_SERVICE_URL
          value: "http://medsync.local/api/notify"
        - name: NEXT_PUBLIC_SYMPTOM_CHECKER_URL
          value: "http://medsync.local/api/symptom-checker"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
