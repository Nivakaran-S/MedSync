apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: medsync
  labels:
    app: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification
        image: notification:latest
        ports:
        - containerPort: 3006
        env:
        - name: PORT
          value: "3006"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: MONGO_BASE
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: MONGO_BASE
        - name: MONGO_URI
          value: "$(MONGO_BASE)/notification_db"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: JWT_SECRET
        - name: FRONTEND_ORIGIN
          value: "http://medsync.local,http://localhost:3000"
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: SMTP_PORT
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: EMAIL_USER
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: EMAIL_PASS
        - name: EMAIL_FROM
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: EMAIL_FROM
        - name: TWILIO_SID
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: TWILIO_SID
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: TWILIO_AUTH_TOKEN
        - name: TWILIO_FROM
          valueFrom:
            secretKeyRef:
              name: medsync-secrets
              key: TWILIO_FROM
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: medsync
  labels:
    app: notification
spec:
  selector:
    app: notification
  ports:
  - port: 3006
    targetPort: 3006
    name: http
  type: ClusterIP