apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medsync-ingress
  namespace: medsync
spec:
  rules:
  - host: medsync.local
    http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth
            port:
              number: 5000
      - path: /api/patients
        pathType: Prefix
        backend:
          service:
            name: patient-management
            port:
              number: 3001
      - path: /api/doctors
        pathType: Prefix
        backend:
          service:
            name: doctor-management
            port:
              number: 3002
      - path: /api/appointments
        pathType: Prefix
        backend:
          service:
            name: appointment
            port:
              number: 3003
      - path: /api/sessions
        pathType: Prefix
        backend:
          service:
            name: telemedicine
            port:
              number: 3004
      - path: /api/payments
        pathType: Prefix
        backend:
          service:
            name: payment
            port:
              number: 3005
      - path: /api/notify
        pathType: Prefix
        backend:
          service:
            name: notification
            port:
              number: 3006
      - path: /api/symptom-checker
        pathType: Prefix
        backend:
          service:
            name: ai-symptom-checker
            port:
              number: 3007
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
